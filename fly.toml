# fly.toml app configuration file generated for wmp-inspector on 2026-07-16T22:15:25+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wmp-inspector'
primary_region = 'arn'

[build]
[env]
  BASE_URL = 'https://wmp-inspector.fly.dev'
  PORT = '8080'
  SELF_ID = 'https://wmp-inspector.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
